<!DOCTYPE html>
<html>
<head>

    <title>Modern Mobile Website</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- jQuery Mobile CSS -->
    <link rel="stylesheet"
    href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

    <!-- jQuery Mobile JS -->
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

    <!-- CSS -->
    <style>

        body{
            font-family: 'Segoe UI', sans-serif;
        }

        /* Header */
        .ui-header{
            background: linear-gradient(45deg,#4facfe,#00f2fe) !important;
            color:white !important;
            border:none !important;
        }

        .ui-title{
            color:white !important;
        }

        /* Footer */
        .ui-footer{
            background:#222 !important;
            color:white !important;
            border:none !important;
        }

        /* Content */
        .ui-content{
            background:#f5f7fa;
        }

        /* Card */
        .card{
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
            margin-top:20px;
        }

        /* Buttons */
        .ui-btn,
        button{
            background:linear-gradient(45deg,#36d1dc,#5b86e5) !important;
            color:white !important;
            border:none !important;
            border-radius:10px !important;
            font-weight:bold;
        }

        .ui-btn:hover,
        button:hover{
            background:linear-gradient(45deg,#5b86e5,#36d1dc) !important;
        }

        /* Back Button */
        .ui-btn[data-icon="back"]{
            background:#ff7e5f !important;
        }

        /* Form */
        input,
        textarea{
            border-radius:8px !important;
            border:1px solid #ccc !important;
        }

        label{
            font-weight:bold;
        }

    </style>

</head>

<body>

<!-- Home Page -->
<div data-role="page" id="home">

    <div data-role="header">
        <h1>My Mobile Site</h1>
    </div>

    <div data-role="content">

        <div class="card">

            <p>Welcome to my modern jQuery Mobile website!</p>

            <a href="#about" data-role="button">
                About
            </a>

            <a href="#contact" data-role="button">
                Contact
            </a>

        </div>

    </div>

    <div data-role="footer">
        <h4>© 2026 Home</h4>
    </div>

</div>

<!-- About Page -->
<div data-role="page" id="about">

    <div data-role="header">

        <a href="#home" data-icon="back">
            Back
        </a>

        <h1>About</h1>

    </div>

    <div data-role="content">

        <div class="card">

            <p>
                This is a beautifully styled About page.
            </p>

        </div>

    </div>

    <div data-role="footer">
        <h4>© 2026 About</h4>
    </div>

</div>

<!-- Contact Page -->
<div data-role="page" id="contact">

    <div data-role="header">

        <a href="#home" data-icon="back">
            Back
        </a>

        <h1>Contact</h1>

    </div>

    <div data-role="content">

        <div class="card">

            <form id="contactForm">

                <label for="name">Name:</label>

                <input type="text"
                id="name"
                placeholder="Enter your name">

                <label for="email">Email:</label>

                <input type="email"
                id="email"
                placeholder="Enter your email">

                <label for="message">Message:</label>

                <textarea id="message"
                placeholder="Enter your message"></textarea>

                <button type="submit">
                    Submit
                </button>

            </form>

        </div>

    </div>

    <div data-role="footer">
        <h4>© 2026 Contact</h4>
    </div>

</div>

<!-- jQuery Script -->
<script>

$(document).ready(function(){

    $("#contactForm").submit(function(e){

        e.preventDefault();

        let name = $("#name").val();
        let email = $("#email").val();
        let message = $("#message").val();

        if(name == "" || email == "" || message == "")
        {
            alert("Please fill all fields");
        }
        else
        {
            alert("Form Submitted Successfully!");

            $("#contactForm")[0].reset();
        }

    });

});

</script>

</body>
</html>
